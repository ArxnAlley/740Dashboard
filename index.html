<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="NuloEdge Bakery Module — 740Eatz Operations Dashboard">

    <title>740Eatz — NuloEdge Dashboard</title>

    <!-- ============================================================
         FAVICON & BROWSER ICONS
    ============================================================ -->

    <link rel="icon" type="image/png" href="nuloEventsFavicon.png">
    <link rel="shortcut icon" href="nuloEventsFavicon.png">
    <link rel="apple-touch-icon" href="nuloEventsFavicon.png">
    <meta name="msapplication-TileImage" content="nuloEventsFavicon.png">
    <meta name="msapplication-TileColor" content="#0A0A0A">
    <meta name="theme-color" content="#0A0A0A">

    <!-- ============================================================
         FONTS
    ============================================================ -->

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- ============================================================
         ICONS
    ============================================================ -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    >

    <!-- ============================================================
         STYLES
    ============================================================ -->

    <link rel="stylesheet" href="css/styleDashboard.css">

</head>

<body class="dashboardApp">

    <!-- ============================================================
         ICON SPRITE
    ============================================================ -->

    <svg class="iconSprite" aria-hidden="true">

        <symbol id="iconDashboard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1"></rect>
        </symbol>

        <symbol id="iconOrderRequests" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="22 12 16 12 14 15 10 15 8 12 2 12"></polyline>
            <path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path>
        </symbol>

        <symbol id="iconConfirmedOrders" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
            <polyline points="22 4 12 14.01 9 9.01"></polyline>
        </symbol>

        <symbol id="iconProductionBoard" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
            <path d="M2 17l10 5 10-5"></path>
            <path d="M2 12l10 5 10-5"></path>
        </symbol>

        <symbol id="iconCustomers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
        </symbol>

        <symbol id="iconTheme" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </symbol>

        <symbol id="iconReviews" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </symbol>

        <symbol id="iconReports" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="20" x2="18" y2="10"></line>
            <line x1="12" y1="20" x2="12" y2="4"></line>
            <line x1="6" y1="20" x2="6" y2="14"></line>
        </symbol>

        <symbol id="iconSettings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </symbol>

        <symbol id="iconHelp" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </symbol>

        <symbol id="iconLogout" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
        </symbol>

        <symbol id="iconMenu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
        </symbol>

        <symbol id="iconBell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </symbol>

        <symbol id="iconPlus" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
        </symbol>

        <symbol id="iconPhone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.82a16 16 0 0 0 6.27 6.27l1.06-1.06a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7a2 2 0 0 1 1.72 2.01z"></path>
        </symbol>

    </svg>

    <!-- ============================================================
         MOBILE OVERLAY
    ============================================================ -->

    <div class="mobileOverlay" id="mobileOverlay"></div>

    <!-- ============================================================
         MOBILE TOP BAR
    ============================================================ -->

    <header class="mobileTopBar" id="mobileTopBar">

        <button
            class="hamburgerBtn"
            id="hamburgerBtn"
            aria-label="Open navigation menu"
        >
            <svg class="icon"><use href="#iconMenu"></use></svg>
        </button>

        <span class="mobilePageTitle" id="mobilePageTitle">Dashboard</span>

        <div class="mobileHeaderSpacer"></div>

    </header>

    <!-- ============================================================
         APP LAYOUT
    ============================================================ -->

    <div class="appLayout">

        <!-- ============================================================
             SIDEBAR
        ============================================================ -->

        <aside class="sidebar" id="sidebar" aria-label="Main navigation">

            <!-- ── 1. Logo ── -->

            <div class="sidebarLogoArea">
                <img src="graphics/logos/TPNuloEdge_Logo .png" alt="NuloEdge" class="sidebarLogoFull">
                <img src="nuloEventsFavicon.png" alt="NuloEdge" class="sidebarLogoMark">
            </div>

            <!-- ── 2. Profile ── -->

            <div class="sidebarProfile">

                <div class="profileAvatar" aria-hidden="true">BN</div>

                <div class="profileDetails">
                    <span class="profileName">Brigitte Nichols</span>
                    <span class="profileCompany">740Eatz</span>
                    <span class="profileStatusBadge">
                        <span class="profileStatusDot"></span>
                        Online
                    </span>
                </div>

            </div>

            <!-- ── 3. Navigation ── -->

            <nav class="sidebarNav" id="sidebarNav" aria-label="Dashboard navigation">

                <button class="navItem isActive" data-page="dashboard" aria-label="Dashboard">
                    <svg class="navIcon"><use href="#iconDashboard"></use></svg>
                    <span class="navItemText">Dashboard</span>
                </button>

                <!-- ── New Order Request CTA ── -->

                <div class="sidebarCTAWrap">

                    <button class="sidebarNewOrderBtn" id="sidebarNewOrderBtn" aria-label="New Order Request">
                        <svg class="navIcon"><use href="#iconPlus"></use></svg>
                        <span>New Order Request</span>
                    </button>

                </div>

                <button class="navItem" data-page="orders" aria-label="Orders">
                    <svg class="navIcon"><use href="#iconOrderRequests"></use></svg>
                    <span class="navItemText">Orders</span>
                    <span class="navBadge" id="navBadgeRequests">3</span>
                </button>

                <button class="navItem" data-page="production" aria-label="Production">
                    <svg class="navIcon"><use href="#iconProductionBoard"></use></svg>
                    <span class="navItemText">Production</span>
                </button>

                <button class="navItem" data-page="customers" aria-label="Customer List">
                    <svg class="navIcon"><use href="#iconCustomers"></use></svg>
                    <span class="navItemText">Customer List</span>
                </button>

                <button class="navItem" data-page="reviews" aria-label="Reviews">
                    <svg class="navIcon"><use href="#iconReviews"></use></svg>
                    <span class="navItemText">Reviews</span>
                </button>

                <button class="navItem" data-page="reports" aria-label="Reports">
                    <svg class="navIcon"><use href="#iconReports"></use></svg>
                    <span class="navItemText">Reports</span>
                </button>

                <div class="sidebarDivider" role="separator" aria-hidden="true"></div>

                <button class="navItem" data-page="settings" aria-label="Settings">
                    <svg class="navIcon"><use href="#iconSettings"></use></svg>
                    <span class="navItemText">Settings</span>
                </button>

                <button class="navItem" data-page="help" aria-label="Help & Support">
                    <svg class="navIcon"><use href="#iconHelp"></use></svg>
                    <span class="navItemText">Help & Support</span>
                </button>

            </nav>

            <!-- ── 4. Bottom ── -->

            <div class="sidebarBottom">

                <button id="themeToggleBtn" class="themeToggleBtn" aria-label="Toggle light/dark mode">
                    <svg class="navIcon"><use href="#iconTheme"></use></svg>
                    <span class="themeToggleLabel" id="themeToggleLabel">Light Mode</span>
                    <div class="themeToggleSwitch" id="themeToggleSwitch">
                        <div class="themeToggleKnob"></div>
                    </div>
                </button>

                <button id="logoutBtn" class="logoutBtn" aria-label="Logout">
                    <svg class="navIcon"><use href="#iconLogout"></use></svg>
                    <span>Logout</span>
                </button>

                <div class="sidebarDivider" role="separator" aria-hidden="true"></div>

                <div class="sidebarBottomBrand">
                    <img src="nuloEventsFavicon.png" alt="NuloEdge" class="sidebarBottomLogo">
                    <div class="sidebarPoweredBy">
                        <p class="sidebarPoweredByText">Powered by NuloOS</p>
                        <p class="sidebarVersion">v1.0.0</p>
                    </div>
                </div>

            </div>

        </aside>

        <!-- ============================================================
             MAIN AREA
        ============================================================ -->

        <main class="mainArea">

            <!-- ── Desktop Top Bar ── -->

            <div class="dashTopBar">

                <div class="topBarLeft"></div>

                <div class="topBarRight">

                    <span class="topBarDate" id="topBarDate"></span>

                    <button class="topBarIconBtn" aria-label="Notifications">
                        <svg class="icon"><use href="#iconBell"></use></svg>
                        <span class="notifDot"></span>
                    </button>

                </div>

            </div>

            <!-- ── Content Area ── -->
            <!-- All page content rendered here by dashboardJS.js -->

            <div class="contentArea" id="contentArea">
            </div>

        </main>

    </div>

    <!-- ============================================================
         SCRIPTS
    ============================================================ -->

    <!-- Data layer — must load before application JS -->
    <script src="js/dashboardData.js"></script>

    <!-- Application logic -->
    <script src="js/dashboardJS.js"></script>

</body>

</html>
